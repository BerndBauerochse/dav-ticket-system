{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md">
        <div class="glass rounded-2xl p-8 border border-white/10 shadow-2xl">
            <div class="text-center mb-8">
                <img src="/static/logo.png" alt="DAV Logo" class="h-16 mx-auto mb-4 object-contain opacity-90">
                <p class="text-gray-400">Bitte melde dich an, um fortzufahren.</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                <input type="hidden" name="next" value="{{ next_url }}">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Passwort</label>
                    <input type="password" id="password" name="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-audible-accent/50 focus:border-audible-accent transition-all">
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-red-700 to-audible-accent text-white font-bold py-3 px-6 rounded-xl hover:shadow-lg hover:shadow-red-900/20 transition-all duration-300">
                        Anmelden
                    </button>
                </div>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-gray-500 hover:text-white transition-colors text-sm">Zurück zur Startseite</a>
        </div>
    </div>
</div>
{% endblock %}
